spring:
  application:
    name: literalura-challenge

  datasource:
    url: jdbc:postgresql://${DB_HOST}/biblioteca_alura
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false